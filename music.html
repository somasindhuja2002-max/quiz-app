<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="music.css">
</head>
<body>
    <div class="album-wrapper">
        <!-- LEFT SIDE -->
        <div class="album">
            <div class="cover">NOVA</div>
            <h2>Nova Beats</h2>
            <p>Electronic / Indie Pop</p>
            <div class="badge">Now Streaming</div>
        </div>
        <!-- RIGHT SIDE -->
        <div class="tracks">
            <h1>ALBUM LAUNCH</h1>
            <span>Click a track to play</span>
            <div class="tracklist">
                <!-- TRACK 1 -->
                <input type="radio" name="song" id="t1">
                <label for="t1" class="track">
                   <strong>01. Midnight Echo</strong>
                   <small>3:45</small>
                </label>
                <audio controls autoplay>
                <source src="../ASSERTS/Audios/the-singing-flowers-242839.mp3">
                </audio>
                 <!-- TRACK 2 -->
                <input type="radio" name="song" id="t2">
                <label for="t2" class="track">
                   <strong>02. Neon Skies</strong>
                   <small>4:10</small>
                </label>
                <audio controls autoplay>
                <source src="../ASSERTS/Audios/the-singing-flowers-242839.mp3">
                </audio>
                <!-- TRACK 3 -->
                <input type="radio" name="song" id="t3">
                <label for="t3" class="track">
                    <strong>03. Pulse Drive</strong>
                    <small>3:58</small>
                </label>
                <audio controls autoplay>
                <source src="../ASSERTS/Audios/the-singing-flowers-242839.mp3">
                </audio>
                <!-- TRACK 4 -->
                <input type="radio" name="song" id="t4">
                <label for="t4" class="track">
                    <strong>04. Digital Drive</strong>
                    <small>5:01</small>
                </label>
                <audio controls autoplay>
                <source src="../ASSERTS/Audios/the-singing-flowers-242839.mp3">
                </audio>
            </div>
            <div class="artist"> 
                <h3>🎤 About the Artist</h3>
                <p>
                    Nova Beats blends  electronic soundscapese with modern pop, creating immersive music experiences for the next generation.
                </p>
            </div>
          </div>
    </div>
</body>
</html>
